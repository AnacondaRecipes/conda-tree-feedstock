{% set name = "conda-tree" %}
{% set version = "1.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/rvalieris/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: e68481c65d7d248a3b87881df6bb88547799499bcac76655a99937923a431fdc

build:
  number: 0
  skip: true  #[py<39]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - conda-tree = conda_tree:main

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - networkx
    - conda
    - colorama

test:
  commands:
    - conda-tree -h
    - pip check
  requires:
    - pip

about:
  home: https://github.com/rvalieris/conda-tree
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: conda dependency tree helper
  description: |
    conda dependency tree helper
  dev_url: https://github.com/rvalieris/conda-tree
about:
home: https://github.com/conda-incubator/conda-tree
license: MIT
license_family: MIT
license_file: LICENSE
summary: conda dependency tree helper
description: |
   conda dependency tree helper
 dev_url: https://github.com/conda-incubator/conda-tree
doc_url: https://github.com/conda-incubator/conda-tree

extra:
  recipe-maintainers:
    - xylar
    - rvalieris
